services:
  olivetin:
    container_name: olivetin
    image: jamesread/olivetin:latest
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Denver}
    volumes:
      - ./olivetin_data:/config
      # Uncomment to let OliveTin actions control Docker on the host.
      # Prefer a socket-proxy in production — see docs/olivetin.md.
      # - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - 1337
    healthcheck:
      # OliveTin serves its web UI on :1337; its Alpine image provides wget.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:1337/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - homepage.group=Ops
      - homepage.name=OliveTin
      - homepage.icon=olivetin.png
      - homepage.href=https://ops.${HOMELAB_DOMAIN:-localhost}
      - homepage.description=Run predefined ops commands
    networks:
      - nginx_proxy_manager_default

networks:
  nginx_proxy_manager_default:
    external: true
