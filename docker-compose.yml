# Homelab in a Box
# Basic services for hosting other containerized applications
services:
  nginxproxymanager:
    image: 'docker.io/jc21/nginx-proxy-manager:latest'
    restart: unless-stopped
    ports:
      - '8100:80'
      - '81:81'
      - '8143:443'
    volumes:
      - ./nginx_proxy_manager_data:/data
      - ./nginx_proxy_manager_data/letsencrypt:/etc/letsencrypt
      - ./nginx_proxy_manager_data/nginx/snippets:/config/nginx/snippets
      - ./nginx_proxy_manager_data/nginx/site-confs:/config/nginx/site-confs
    environment:
      TZ: ${TZ:-America/Denver}
    labels:
      - homepage.group=Infrastructure
      - homepage.name=Nginx Proxy Manager
      - homepage.icon=nginx-proxy-manager.png
      - homepage.href=https://npm.${HOMELAB_DOMAIN:-localhost}
      - homepage.description=Reverse proxy and SSL
    networks:
      - nginx_proxy_manager_default
  authelia:
    image: authelia/authelia
    volumes:
      - ./nginx_proxy_manager_data/authelia_config:/config
    ports:
      - 9091:9091
    restart: unless-stopped
    healthcheck:
      disable: true
    environment:
      - TZ=${TZ:-America/Denver}
      # PUID/PGID drop privileges from root. Leave PUID/PGID empty in .env to
      # keep Authelia's image default. Only Authelia uses these in this stack.
      - PUID=${PUID:-}
      - PGID=${PGID:-}
    labels:
      - homepage.group=Infrastructure
      - homepage.name=Authelia
      - homepage.icon=authelia.png
      - homepage.href=https://auth.${HOMELAB_DOMAIN:-localhost}
      - homepage.description=SSO and 2FA portal
    depends_on:
      - redis
  redis:
    image: redis:alpine
    volumes:
      - ./redis:/data
    expose:
      - 6379
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/Denver}
  portainer:
    container_name: Portainer
    image: portainer/portainer-ce:latest
    restart: always
    security_opt:
      - no-new-privileges:true
    ports:
      - "9000:9000"
    environment:
      - TZ=${TZ:-America/Denver}
    #  - VIRTUAL_HOST=fqdn behind proxy
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer_data:/data
    labels:
      - homepage.group=Infrastructure
      - homepage.name=Portainer
      - homepage.icon=portainer.png
      - homepage.href=https://portainer.${HOMELAB_DOMAIN:-localhost}
      - homepage.description=Docker management UI
networks:
  nginx_proxy_manager_default:
    external: true
# The following are optional services you may want to enable.
# Consult the documentation for each to understand what may 
# need to be configured for any particular service.
# Add additional services/stacks here as well to keep everything in 
# one place.
include:
  # - compose.mysql.yml         # MySQL 8 + Adminer
  # - compose.vaultwarden.yml   # Vaultwarden (Bitwarden-compatible password manager)
  # - compose.homeassistant.yml # Home Assistant (home automation platform)
  # - compose.pihole.yml        # Pi-hole (network-wide DNS ad blocker)
  # - compose.plex.yml          # Plex (media server)
  # - compose.olivetin.yml      # OliveTin (web UI for homelab ops commands)
  # - compose.n8n.yml           # n8n (workflow automation + AI)
  # - compose.uptimekuma.yml    # Uptime Kuma (uptime / network monitoring)
  # - compose.navidrome.yml     # Navidrome (music streaming server)
  # - compose.homepage.yml      # Homepage (dashboard with service discovery)
  # - compose.backup.yml        # Automated encrypted backups (offen/docker-volume-backup)