services:
  vaultwarden:
    image: vaultwarden/server:latest
    restart: unless-stopped
    # The Vaultwarden image ships its own HEALTHCHECK (probes the /alive
    # endpoint), so its health is reported in `docker compose ps` as-is.
    environment:
      TZ: ${TZ:-America/Denver}
      DOMAIN: ${VAULTWARDEN_DOMAIN}
      SIGNUPS_ALLOWED: ${VAULTWARDEN_SIGNUPS_ALLOWED:-false}
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN}
    volumes:
      - ./vaultwarden_data:/data
    labels:
      - homepage.group=Security
      - homepage.name=Vaultwarden
      - homepage.icon=vaultwarden.png
      - homepage.href=https://vault.${HOMELAB_DOMAIN:-localhost}
      - homepage.description=Password manager
      # Uncomment the label below together with the ./vaultwarden_data mount in
      # compose.backup.yml. It stops Vaultwarden briefly during each backup so
      # its SQLite database is captured consistently — enabling it without the
      # mount just adds downtime with nothing archived. See docs/backup.md.
      # - docker-volume-backup.stop-during-backup=true
    networks:
      - nginx_proxy_manager_default

networks:
  nginx_proxy_manager_default:
    external: true
