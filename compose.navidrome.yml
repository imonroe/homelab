services:
  navidrome:
    container_name: navidrome
    image: deluan/navidrome:latest
    restart: unless-stopped
    # Runs as the shared PUID/PGID (defaults to 1000); must own ./navidrome_data
    user: ${PUID:-1000}:${PGID:-1000}
    environment:
      TZ: ${TZ:-America/Denver}
      ND_MUSICFOLDER: /music
      ND_DATAFOLDER: /data
    volumes:
      - ./navidrome_data:/data
      # Point this at your music library (read-only)
      - ${NAVIDROME_MUSIC_DIR:-./navidrome_music}:/music:ro
    expose:
      - 4533
    healthcheck:
      # Navidrome exposes /ping on :4533; its Alpine image provides wget
      # (this mirrors the image's own built-in healthcheck).
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:4533/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - homepage.group=Media
      - homepage.name=Navidrome
      - homepage.icon=navidrome.png
      - homepage.href=https://music.${HOMELAB_DOMAIN:-localhost}
      - homepage.description=Music streaming server
    networks:
      - nginx_proxy_manager_default

networks:
  nginx_proxy_manager_default:
    external: true
