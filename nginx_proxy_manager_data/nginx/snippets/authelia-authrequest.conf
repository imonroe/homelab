## Send a subrequest to Authelia to verify the user is authenticated and authorized.
auth_request /authelia;

## Save the upstream metadata response headers from Authelia to variables.
auth_request_set $user $upstream_http_remote_user;
auth_request_set $groups $upstream_http_remote_groups;
auth_request_set $name $upstream_http_remote_name;
auth_request_set $email $upstream_http_remote_email;

## Inject the metadata response headers into the request made to the backend.
proxy_set_header Remote-User $user;
proxy_set_header Remote-Groups $groups;
proxy_set_header Remote-Name $name;
proxy_set_header Remote-Email $email;

## Modern method: Authelia returns the redirect target in the Location header of the
## authz response. On a 401, redirect the browser there (the portal, with rd handled
## by the session cookie's authelia_url value).
auth_request_set $redirection_url $upstream_http_location;
error_page 401 =302 $redirection_url;
