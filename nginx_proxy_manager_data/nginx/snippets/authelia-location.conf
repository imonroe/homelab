# Authelia internal auth endpoint (modern method, Authelia 4.38+).
# Forwards the auth subrequest to Authelia's authz endpoint.
location /authelia {
    internal;
    proxy_pass http://nginx_proxy_manager-authelia-1:9091/api/authz/auth-request;

    ## Headers (X-* headers are required by Authelia).
    proxy_set_header X-Original-Method $request_method;
    proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header Content-Length "";
    proxy_set_header Connection "";

    ## Basic proxy configuration.
    proxy_pass_request_body off;
    proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
    proxy_http_version 1.1;
    proxy_cache_bypass $cookie_session;
    proxy_no_cache $cookie_session;
    proxy_buffers 4 32k;
    client_body_buffer_size 128k;

    send_timeout 5m;
    proxy_read_timeout 240;
    proxy_send_timeout 240;
    proxy_connect_timeout 240;
}
