services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Denver}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-homelab}
    volumes:
      - ./mysql_data:/var/lib/mysql
    expose:
      - 3306
    labels:
      # Stop MySQL briefly during backups so InnoDB files are captured in a
      # consistent state. Only takes effect when compose.backup.yml is enabled;
      # inert otherwise. See docs/backup.md for a zero-downtime mysqldump
      # alternative.
      - docker-volume-backup.stop-during-backup=true
    networks:
      - mysql_internal

  adminer:
    image: adminer
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Denver}
      ADMINER_DEFAULT_SERVER: mysql
    labels:
      - homepage.group=Databases
      - homepage.name=Adminer
      - homepage.icon=adminer.png
      - homepage.href=https://adminer.${HOMELAB_DOMAIN:-localhost}
      - homepage.description=Database admin UI
    networks:
      - mysql_internal
      - nginx_proxy_manager_default

networks:
  mysql_internal:
  nginx_proxy_manager_default:
    external: true
