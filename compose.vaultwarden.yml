services:
  vaultwarden:
    image: vaultwarden/server:latest
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Denver}
      DOMAIN: ${VAULTWARDEN_DOMAIN}
      SIGNUPS_ALLOWED: ${VAULTWARDEN_SIGNUPS_ALLOWED:-false}
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN}
    volumes:
      - ./vaultwarden_data:/data
    labels:
      - homepage.group=Security
      - homepage.name=Vaultwarden
      - homepage.icon=vaultwarden.png
      - homepage.href=https://vault.${HOMELAB_DOMAIN:-localhost}
      - homepage.description=Password manager
      # Stop Vaultwarden briefly during backups so its SQLite database is
      # captured in a consistent state. Only takes effect when
      # compose.backup.yml is enabled; inert otherwise.
      - docker-volume-backup.stop-during-backup=true
    networks:
      - nginx_proxy_manager_default

networks:
  nginx_proxy_manager_default:
    external: true
